name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Leave empty for latest build from main.'
        required: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
            cc: gcc

          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
            cc: aarch64-linux-gnu-gcc
            cross: true

          - runner: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            cc: clang

          - runner: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ env.RELEASE_TAG }}" -o lusterpass-${{ matrix.suffix }}${{ matrix.ext }} .

      - uses: actions/upload-artifact@v4
        with:
          name: lusterpass-${{ matrix.suffix }}
          path: lusterpass-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum lusterpass-* > checksums.txt
          cat checksums.txt

      # Determine release tag — use 'latest' for manual runs without a tag
      - name: Resolve release tag
        id: resolve
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if [[ "$TAG" == "main" || -z "$TAG" ]]; then
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      # Release binaries + checksums.
      # For 'latest', delete existing release first so it can be recreated.
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if [[ "$TAG" == "latest" ]]; then
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "lusterpass $TAG" \
              --prerelease \
              --notes "Latest build from main" \
              dist/*
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "lusterpass $TAG" \
              --generate-notes \
              dist/*
          fi


